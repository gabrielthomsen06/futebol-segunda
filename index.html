<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0d1f15"/>
<title>Futebol de Segunda</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body, system-ui, sans-serif);
    color: var(--fg, #15140f);
    background: var(--bg, #fafaf7);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    -webkit-tap-highlight-color: transparent;
  }
  button { font-family: inherit; }
  input, select, textarea { font-family: inherit; font-size: 16px; } /* 16px evita zoom no iOS */

  /* Várzea theme – chunky borders */
  body[data-theme="varzea"] .card { border: 2px solid #1a1a1a !important; }
  body[data-theme="varzea"] header { border-bottom: 2px solid #1a1a1a !important; }
  body[data-theme="varzea"] footer { border-top: 2px solid #1a1a1a !important; }
  body[data-theme="varzea"] table tr { border-bottom: 1px solid #1a1a1a !important; }
  body[data-theme="varzea"] th, body[data-theme="varzea"] td { color: #1a1a1a; }
  body[data-theme="varzea"] button.btn-primary { box-shadow: 3px 3px 0 #1a1a1a; }

  /* Estádio – pitch lines feel */
  body[data-theme="estadio"] header::after {
    content:''; display:block; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    opacity: 0.4;
  }

  /* ── Responsive utilities ───────────────────────────────────────────── */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 14px 32px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .grid-stats-6 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .show-mobile { display: none; }
  .nav-bottom { display: none; }

  @media (max-width: 760px) {
    .container { padding: 16px; padding-bottom: 96px; }
    .header-inner { padding: 12px 16px; gap: 12px !important; }
    .grid-2 { grid-template-columns: 1fr; gap: 16px; }
    .grid-3 { grid-template-columns: 1fr; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .grid-stats-6 { grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .hide-mobile { display: none !important; }
    .show-mobile { display: block; }
    .show-mobile-flex { display: flex !important; }
    .stack-mobile { grid-template-columns: 1fr !important; }
    .nav-bottom {
      display: flex !important;
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
      background: color-mix(in srgb, var(--bg) 95%, transparent);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--line);
      padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
    }
    .nav-bottom button {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
      padding: 6px 4px; border: 0; background: transparent; cursor: pointer;
      color: var(--fg-3); font-size: 10px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      font-family: var(--font-body);
    }
    .nav-bottom button.active { color: var(--accent); }
    .h1-mobile { font-size: 28px !important; }
    .hero-title { font-size: 32px !important; white-space: normal !important; }
    .score-mobile { font-size: 40px !important; }
    .pad-mobile-sm { padding: 16px !important; }
    .card-mobile { padding: 16px !important; }
    .scoreboard-grid { gap: 10px !important; }
    .team-name { font-size: 14px !important; }
    .events-grid { gap: 12px !important; }
    .event-row-text { font-size: 12px !important; }
    .row-compact { padding: 10px 12px !important; }
    .nowrap-fix { white-space: normal !important; }
    .mobile-row {
      flex-direction: column !important; align-items: stretch !important; gap: 12px !important;
    }
    .player-history-row {
      grid-template-columns: 70px 1fr auto !important;
    }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="config.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="supabase.jsx"></script>
<script type="text/babel" src="themes.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens-stats.jsx"></script>
<script type="text/babel" src="screens-edit.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
