<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1280"/>
<title>Futebol de Segunda</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body, system-ui, sans-serif);
    color: var(--fg, #15140f);
    background: var(--bg, #fafaf7);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  button { font-family: inherit; }
  /* Várzea theme – chunky borders */
  body[data-theme="varzea"] .card { border: 2px solid #1a1a1a !important; }
  body[data-theme="varzea"] header { border-bottom: 2px solid #1a1a1a !important; }
  body[data-theme="varzea"] footer { border-top: 2px solid #1a1a1a !important; }
  body[data-theme="varzea"] table tr { border-bottom: 1px solid #1a1a1a !important; }
  body[data-theme="varzea"] th, body[data-theme="varzea"] td { color: #1a1a1a; }
  body[data-theme="varzea"] button.btn-primary { box-shadow: 3px 3px 0 #1a1a1a; }

  /* Estádio – pitch lines feel */
  body[data-theme="estadio"] header::after {
    content:''; display:block; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent) 20%, var(--accent) 80%, transparent);
    opacity: 0.4;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
